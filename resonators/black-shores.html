<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Game</title>

    <link rel="stylesheet" href="../styles/character.css">
    
  </head>

  <body>
    <div class="scale-wrapper">
      <main class="child-main">
        <section id="black-shores">
          <div class="background-name">
            <div class="background">
              <img src="../icons/resonators/background/black_shores.png">
            </div>
            <div class="name">BLACK SHORES</div>            
          </div>     

          <div class="character-wrapper">
            <div class="character">
              <div class="characterList">
                <img src="../icons/resonators/black_shores/buling.webp">

              </div>
              <div class="characterList">
                <img src="../icons/resonators/black_shores/galbrena.webp">
                <p>Galbrena</p>
              </div>
              <div class="characterList">
                <img src="../icons/resonators/black_shores/camellya.png">
                <p>Camellya</p>
              </div>
              <div class="characterList">
                <img src="../icons/resonators/black_shores/the_shorekeeper.png">
                <p>The Shorekeeper</p>
              </div>
              <div class="characterList">
                <img src="../icons/resonators/black_shores/encore.png">
                <p>Encore</p>
              </div>
              <div class="characterList">
                <img src="../icons/resonators/black_shores/aalto.png">
                <p>Aalto</p>
              </div>
            </div>
            <div class="buttons">
              <button id="prev"><</button>
              <button id="next">></button>
            </div>
          </div>
        </section>
      </main>
    </div>
